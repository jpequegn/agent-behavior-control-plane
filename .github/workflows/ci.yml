name: quality

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: test -z "$(gofmt -l ./cmd ./internal)"
      - run: go vet ./...
      - run: go test -race ./...
      - run: go build ./cmd/abcp
      - run: go run ./cmd/abcp demo incident
